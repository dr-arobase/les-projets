<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>@dr.arobase</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Icônes -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #2b0a3d, #050007);
  color: white;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 30px 20px;
  text-align: center;
}

/* Avatar */
.avatar {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  margin: 20px auto;
}

/* Texte */
h1 {
  margin: 10px 0 5px;
  font-size: 1.4rem;
}

p {
  margin: 0 0 25px;
  opacity: 0.8;
}

/* Boutons */
.link {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
  color: white;
  text-decoration: none;
  padding: 16px;
  border-radius: 14px;
  margin: 14px 0;
  font-weight: 500;
  transition: 0.2s;
}

.link:hover {
  transform: scale(1.03);
  background: #111;
}

/* Icônes bas */
.socials {
  margin-top: 35px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 16px;
}

.socials a {
  color: white;
  font-size: 1.4rem;
  opacity: 0.85;
  transition: 0.2s;
}

.socials a:hover {
  opacity: 1;
  transform: scale(1.2);
}
</style>
</head>

<body>
  <div class="container">

    <img src="chainsaw-man.gif" alt="avatar" class="avatar">

    <h1>@dr.arobase</h1>
    <p>mes infos</p>

    <a class="link" href="#">Tellonym</a>
    <a class="link" href="#">reddit</a>
    <a class="link" href="#">deviantart</a>
    <a class="link" href="#">mon site web pour bientôt………</a>

    <div class="socials">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-threads"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
      <a href="#"><i class="fab fa-x-twitter"></i></a>
      <a href="#"><i class="fab fa-discord"></i></a>
      <a href="#"><i class="fab fa-github"></i></a>
      <a href="#"><i class="fab fa-soundcloud"></i></a>
      <a href="#"><i class="fab fa-pinterest"></i></a>
      <a href="#"><i class="fab fa-twitch"></i></a>
    </div>

  </div>
</body>
</html>
