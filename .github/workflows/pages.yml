# Déploiement automatique sur GitHub Pages
# Déclenché sur chaque push vers main

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inspect workspace before upload
        run: |
          echo "PWD: $(pwd)"
          echo "List root files:" 
          ls -la
          echo "\nCheck index.html exists and preview:" 
          if [ -f index.html ]; then echo "index.html found"; wc -c index.html; head -n 6 index.html; else echo "index.html NOT FOUND"; fi
          echo "\nCount files (depth 2):"; find . -maxdepth 2 -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
